<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>View Policies</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --danger-gradient: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.15), transparent 40%);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: var(--primary-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .button-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            background: var(--surface-color);
            color: var(--text-primary);
            font-weight: 600;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
        }

        .table-container {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 800px;
        }

        thead {
            background: rgba(255, 255, 255, 0.05);
        }

        th {
            padding: 18px 20px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            transition: background 0.2s ease;
        }

        tbody tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            white-space: nowrap;
        }

        .action-link {
            text-decoration: none;
            color: #818cf8;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.2s;
            margin-right: 15px;
            display: inline-block;
        }

        .action-link:hover {
            color: #a855f7;
        }

        .delete-btn {
            color: #f87171;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .msg-alert {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            animation: fadeIn 0.5s ease-out;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <div class="container">
        <div th:if="${message}" class="msg-alert">
            <span th:text="${message}"></span>
        </div>

        <h1>Insurance Policies</h1>

        <!-- Buttons -->
        <div class="button-bar">
            <div style="display: flex; gap: 15px;">
                <a href="/" class="btn" style="border-color: rgba(255,255,255,0.2);">← Dashboard</a>
                <a href="/api/filter-page" class="btn">Filter Policies</a>
            </div>
            <a href="/api/new" class="btn btn-primary">+ Create Policy</a>
        </div>

        <!-- Policies Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Policy Holder</th>
                        <th>Type</th>
                        <th>Premium</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${readpolicy == null or readpolicy.isEmpty()}">
                        <td colspan="7" class="empty-state">No policies found. Create one to get started!</td>
                    </tr>
                    <tr th:each="policy : ${readpolicy}">
                        <td th:text="${policy.policyHolderName}"></td>
                        <td th:text="${policy.policyType}"></td>
                        <td th:text="${'$' + policy.premiumAmount}"></td>
                        <td th:text="${policy.startDate}"></td>
                        <td th:text="${policy.endDate}"></td>
                        <td><span class="status-badge" th:text="${policy.status}"></span></td>
                        <td>
                            <a th:href="@{'/api/edit/' + ${policy.policyId}}" class="action-link">Edit</a>
                            <a th:href="@{'/api/delete/' + ${policy.policyId}}" class="action-link delete-btn"
                                onclick="return confirm('Are you sure you want to delete this policy?');">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>

</html>
