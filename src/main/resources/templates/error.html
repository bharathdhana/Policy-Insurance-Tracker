<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-template {
            padding: 40px 15px;
            text-align: center;
        }
        .error-actions {
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .error-actions .btn {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="error-template">
                    <h1>Oops!</h1>
                    <h2>Something went wrong</h2>
                    <div class="error-details mt-4">
                        <p class="lead">We've encountered an unexpected error.</p>
                        <p class="text-muted" th:text="${error}">Error details</p>
                        <p class="text-muted">Status: <span th:text="${status}"></span></p>
                    </div>
                    <div class="error-actions mt-4">
                        <a href="/" class="btn btn-primary btn-lg">
                            Take Me Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
