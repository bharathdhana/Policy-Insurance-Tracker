<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Update Policy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top left, rgba(99, 102, 241, 0.1), transparent 40%),
                radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.1), transparent 40%);
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .form-container {
            width: 100%;
            max-width: 550px;
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            background: var(--primary-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        input[type=text],
        input[type=number],
        input[type=date],
        select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            box-sizing: border-box;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        select option {
            background-color: var(--bg-color);
            color: var(--text-primary);
        }

        ::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.6;
            cursor: pointer;
        }

        .button-group {
            margin-top: 15px;
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .msg-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <div th:if="${msg}" class="msg-alert">
            <span th:text="${msg}"></span>
        </div>

        <h2>Update Insurance Policy</h2>
        <form th:action="@{'/api/edit/' + ${OldValue.policyId}}" th:method="post" th:object="${OldValue}">

            <div class="input-group">
                <label>Policy Number</label>
                <input type="number" th:field="*{policyNumber}" placeholder="e.g. 10001">
            </div>

            <div class="input-group">
                <label>Policy Holder Name</label>
                <input type="text" th:field="*{policyHolderName}" placeholder="John Doe">
            </div>

            <div class="input-group">
                <label>Insurance Type</label>
                <select th:field="*{policyType}">
                    <option value="Health Insurance">Health Insurance</option>
                    <option value="Life Insurance">Life Insurance</option>
                    <option value="Vehicle Insurance">Vehicle Insurance</option>
                    <option value="Property Insurance">Property Insurance</option>
                    <option value="Home Insurance">Home Insurance</option>
                    <option value="Mutual Funds">Mutual Funds</option>
                </select>
            </div>

            <div class="input-group">
                <label>Premium Amount ($)</label>
                <input type="number" th:field="*{premiumAmount}" placeholder="500">
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="input-group" style="flex: 1;">
                    <label>Start Date</label>
                    <input type="date" th:field="*{startDate}">
                </div>

                <div class="input-group" style="flex: 1;">
                    <label>End Date</label>
                    <input type="date" th:field="*{endDate}">
                </div>
            </div>

            <div class="input-group">
                <label>Status</label>
                <input type="text" th:field="*{status}" placeholder="Active">
            </div>

            <div class="button-group">
                <a href="/api/view" class="btn btn-secondary">Cancel</a>
                <input type="submit" value="Update Policy" class="btn btn-primary">
            </div>
        </form>
    </div>
</body>

</html>
